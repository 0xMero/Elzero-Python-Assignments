<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — Admin Panel</title>
<style>
:root{
  --bg:#070709;--panel:#101018;--panel2:#15151f;--line:#1f1f2c;
  --text:#e6e6ef;--muted:#7a7a8c;--accent:#ff2d55;--accent2:#7c5cff;
  --ok:#22d3a8;--warn:#f5b301;--bad:#ff3860;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'JetBrains Mono','Fira Code',ui-monospace,monospace;
  background:radial-gradient(1200px 600px at 80% -10%, rgba(124,92,255,.15), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(255,45,85,.12), transparent 60%), var(--bg);
  color:var(--text);overflow-x:hidden;}
a{color:var(--accent2);text-decoration:none}
.container{max-width:1240px;margin:0 auto;padding:28px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.18em;
  font-size:13px;text-transform:uppercase;color:var(--text);}
.brand .dot{width:10px;height:10px;background:var(--accent);border-radius:2px;box-shadow:0 0 18px var(--accent);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(180deg,#1a1a26,#11111a);color:var(--text);border:1px solid var(--line);
  padding:11px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;
  letter-spacing:.06em;text-transform:uppercase;transition:.2s;}
.btn:hover{border-color:var(--accent2)}
.btn.primary{background:linear-gradient(180deg,var(--accent),#b8203f);border-color:transparent;color:#fff;}
.input,textarea.input{width:100%;background:#0a0a12;border:1px solid var(--line);color:var(--text);
  padding:13px 14px;border-radius:8px;font-family:inherit;font-size:13px;outline:none;}
.input:focus{border-color:var(--accent2)}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--line);border-radius:14px;padding:22px;position:relative;overflow:hidden;}
.muted{color:var(--muted)}
.tag{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
  border:1px solid var(--line);padding:4px 8px;border-radius:999px;}
.kbd{font-size:11px;background:#0a0a12;border:1px solid var(--line);padding:2px 6px;border-radius:4px;color:var(--muted)}
hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0}
.grid{display:grid;gap:18px}
.g-3{grid-template-columns:repeat(3,1fr)} .g-4{grid-template-columns:repeat(4,1fr)} .g-2{grid-template-columns:2fr 1fr}
@media (max-width:980px){.g-3,.g-4,.g-2{grid-template-columns:1fr}}
.stat{font-size:30px;font-weight:700}
.stat small{display:block;font-size:10px;letter-spacing:.25em;color:var(--muted);margin-top:8px;text-transform:uppercase}
.sidebar{position:sticky;top:28px;}
.menu a{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:8px;
  color:var(--muted);font-size:12px;letter-spacing:.1em;text-transform:uppercase;}
.menu a.active,.menu a:hover{background:#0a0a12;color:var(--text);border:1px solid var(--line)}
.menu a .b{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.term{background:#04040a;border:1px solid var(--line);border-radius:10px;
  font-family:inherit;font-size:12.5px;color:#c8c8d4;padding:16px;white-space:pre-wrap;max-height:420px;overflow:auto;}
.flash{padding:11px 14px;border-radius:8px;border:1px solid var(--line);background:#0a0a12;font-size:12.5px;margin-bottom:14px;color:var(--warn)}
.flash.bad{border-color:rgba(255,56,96,.5);color:var(--bad)}
.flash.ok{border-color:rgba(34,211,168,.5);color:var(--ok)}
.title{font-size:22px;font-weight:700}
.subtitle{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
</style>
</head><body>
<div class="container" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div style="width:100%;max-width:430px">
    <div style="text-align:center;margin-bottom:26px">
      <div class="brand" style="justify-content:center"><span class="dot"></span> ADMIN PANEL</div>
      <h1 style="font-size:34px;margin-top:14px;letter-spacing:.04em">SECURE ACCESS</h1>
      <p class="muted" style="margin-top:8px;font-size:12px;letter-spacing:.2em;text-transform:uppercase">authorized personnel only</p>
    </div>
    <div class="card">
      <div id="err" class="flash bad" style="display:none"></div>
      <form id="loginForm" autocomplete="off">
        <label class="subtitle">Username</label>
        <input class="input" id="u" name="username" placeholder="username" style="margin:6px 0 16px"/>
        <label class="subtitle">Password</label>
        <input class="input" id="p" name="password" type="password" placeholder="********" style="margin:6px 0 22px"/>
        <button class="btn primary" style="width:100%" type="submit">Authenticate</button>
      </form>
      <!-- dev note: test user 'Michale' still active in db, remove before prod -->
      <hr class="sep"/>
      <p class="muted" style="font-size:11px;text-align:center">
        v4.2.1 · <span class="kbd">api/json</span> ·
      </p>
    </div>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err'); err.style.display='none';
  const payload = {
    username: document.getElementById('u').value,
    password: document.getElementById('p').value
  };
  try {
    const r = await fetch('/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await r.json().catch(()=>({ok:false,error:'Bad response'}));
    if (data.ok) { window.location = data.redirect || '/dashboard'; }
    else { err.textContent = data.error || 'ACCESS DENIED'; err.style.display='block'; }
  } catch (ex) {
    err.textContent = 'Network error'; err.style.display='block';
  }
});
</script>
